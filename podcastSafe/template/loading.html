<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The SafePlace by K — Chargement...</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24..48,400,0,0" rel="stylesheet" />
<style>
  body { background: #00261b; font-family: 'Inter', sans-serif; }
  @keyframes iconFloat {
    0%,100% { transform: translateY(0) rotate(0deg); opacity:0.15; }
    50% { transform: translateY(-20px) rotate(5deg); opacity:0.4; }
  }
  @keyframes progressAnim { 0%{width:0%} 100%{width:100%} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .icon-float { animation: iconFloat 4s ease-in-out infinite; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0; }
  .progress-bar { animation: progressAnim 2s ease-in-out forwards; }
  .fade-in { animation: fadeIn 0.8s ease-out forwards; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">

<!-- Croix flottantes décoratives -->
<div class="fixed inset-0 pointer-events-none">
  <div class="icon-float absolute top-10 left-16 text-white text-6xl" style="animation-delay:0s"><span class="material-symbols-outlined">shield</span></div>
  <div class="icon-float absolute top-1/3 right-12 text-white text-4xl" style="animation-delay:1.2s"><span class="material-symbols-outlined">shield</span></div>
  <div class="icon-float absolute bottom-20 left-1/4 text-white text-5xl" style="animation-delay:0.6s"><span class="material-symbols-outlined">shield</span></div>
  <div class="icon-float absolute bottom-1/3 right-1/3 text-white text-3xl" style="animation-delay:1.8s"><span class="material-symbols-outlined">shield</span></div>
  <div class="icon-float absolute top-1/4 left-1/2 text-white text-2xl" style="animation-delay:0.9s"><span class="material-symbols-outlined">shield</span></div>
</div>

<!-- Orbe gradient -->
<div class="fixed top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full" style="background:radial-gradient(circle,rgba(159,247,0,0.15),transparent 70%); filter:blur(40px)"></div>

<!-- Contenu centré -->
<div class="relative z-10 flex flex-col items-center gap-8 fade-in">
  <div class="flex flex-col items-center gap-4">
    <div class="w-24 h-24 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20 shadow-2xl">
      <span class="material-symbols-outlined text-white text-6xl">shield</span>
    </div>
    <div class="text-center">
      <h1 class="text-3xl font-bold text-white" style="font-family:'Montserrat',sans-serif">The SafePlace</h1>
      <p class="text-lg font-bold" style="color:#9ff700;font-family:'Montserrat',sans-serif">by K</p>
    </div>
  </div>

  <p class="text-white/70 text-center text-sm max-w-xs leading-relaxed">
    Votre refuge de foi et d'inspirations chrétiennes
  </p>

  <!-- Barre de progression -->
  <div class="w-64 h-1 bg-white/20 rounded-full overflow-hidden">
    <div class="h-full rounded-full progress-bar" style="background:#9ff700"></div>
  </div>

  <!-- Barres d'onde animées -->
  <div class="flex items-end gap-1 h-8">
    {% for i in "12345678" %}
    <div class="w-1.5 rounded-full" style="background:#9ff700;animation:crossFloat {{ forloop.counter|add:1 }}00ms ease-in-out infinite alternate;height:{{ forloop.counter|add:5 }}px"></div>
    {% endfor %}
  </div>

  <p class="text-white/50 text-xs">Chargement en cours...</p>
</div>

<script>
  setTimeout(() => { window.location.href = '/'; }, 2500);
</script>
</body>
</html>
