<article class="ep-card" role="listitem">
          <a href="{% url 'podcast_detail' episode.pk %}" class="block relative overflow-hidden" style="aspect-ratio:16/9;background:linear-gradient(135deg,{{ episode.cover_color }},#416900)">
            <span class="material-symbols-outlined text-white/30 text-8xl absolute inset-0 m-auto w-fit h-fit">smart_display</span>
            <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity" style="background:rgba(0,0,0,0.3)">
              <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background:#9ff700">
                <span class="material-symbols-outlined text-2xl" style="color:#00261b;font-variation-settings:'FILL' 1">play_arrow</span>
              </div>
            </div>
          </a>
