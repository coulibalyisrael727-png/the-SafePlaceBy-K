<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Dashboard The SafePlace</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary":"#00261b","lime":"#9ff700","lime-dark":"#446e00",
            "outline-variant":"#c0c8c3","error":"#ba1a1a","error-container":"#ffdad6",
          },
          fontFamily: { "heading":["Montserrat","sans-serif"], "body":["Inter","sans-serif"] },
          animation: { "fade-in-up":"fadeInUp .6s ease both" },
          keyframes: { fadeInUp:{"0%":{opacity:"0",transform:"translateY(24px)"},"100%":{opacity:"1",transform:"none"}} },
        }
      }
    }
    </script>
</head>
<body class="font-body min-h-screen flex items-center justify-center bg-gradient-to-br from-primary via-[#0b3d2e] to-[#214f3f] text-[#1a1c1b] relative overflow-hidden antialiased">
    
    <!-- Decorative Orbs -->
    <div class="absolute w-[400px] h-[400px] rounded-full bg-lime/10 blur-[80px] -top-[100px] -right-[100px] animate-[pulse_10s_ease-in-out_infinite]"></div>
    <div class="absolute w-[300px] h-[300px] rounded-full bg-white/10 blur-[60px] -bottom-[80px] -left-[80px] animate-[pulse_8s_ease-in-out_infinite_reverse]"></div>

    <!-- Login Container -->
    <div class="w-full max-w-[420px] p-6 relative z-10 animate-fade-in-up">
        <div class="bg-white/95 backdrop-blur-xl border border-outline-variant/50 rounded-[24px] p-10 shadow-[0_24px_64px_rgba(0,0,0,0.3)]">
            
            <div class="text-center mb-8">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-[#0b3d2e] flex items-center justify-center shadow-inner">
                        <span class="material-symbols-outlined text-lime text-2xl" style="font-variation-settings:'FILL' 1">church</span>
                    </div>
                    <div class="font-heading text-2xl font-bold text-primary">SafePlace <span class="text-lime-dark">by K</span></div>
                </div>
                <div class="text-[#414944] text-sm font-medium">Accès administrateur — Dashboard</div>
            </div>

            {% if form.errors %}
                <div class="bg-error-container text-[#93000a] border border-[#ffcdd2] px-4 py-3 rounded-xl mb-5 flex items-start gap-3 text-sm">
                    <span class="material-symbols-outlined text-lg mt-0.5">error</span>
                    <div>
                        {% for field, errors in form.errors.items %}
                            {% for error in errors %}<p>{{ error }}</p>{% endfor %}
                        {% endfor %}
                    </div>
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="{{ form.username.id_for_label }}" class="block mb-2 font-semibold text-primary text-sm">
                        Nom d'utilisateur
                    </label>
                    <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}"
                        class="w-full px-4 py-3 border border-outline-variant rounded-xl text-base bg-[#f9f9f7] focus:outline-none focus:border-[#396756] focus:ring-4 focus:ring-[#396756]/15 transition-all"
                        placeholder="Entrez votre nom d'utilisateur" required autofocus>
                </div>

                <div>
                    <label for="{{ form.password.id_for_label }}" class="block mb-2 font-semibold text-primary text-sm">
                        Mot de passe
                    </label>
                    <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}"
                        class="w-full px-4 py-3 border border-outline-variant rounded-xl text-base bg-[#f9f9f7] focus:outline-none focus:border-[#396756] focus:ring-4 focus:ring-[#396756]/15 transition-all"
                        placeholder="Entrez votre mot de passe" required>
                </div>

                <input type="hidden" name="next" value="{{ next|default:'' }}">

                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-primary to-[#0b3d2e] text-white rounded-full text-base font-bold flex items-center justify-center gap-2 hover:shadow-[0_8px_24px_rgba(0,38,27,0.3)] hover:-translate-y-0.5 active:scale-95 transition-all mt-6">
                    <span class="material-symbols-outlined text-xl">lock_open</span>
                    Se connecter
                </button>
            </form>

            <div class="text-center mt-8 pt-6 border-t border-outline-variant/50">
                <a href="http://127.0.0.1:8000/" class="inline-flex items-center gap-1 text-lime-dark font-semibold text-sm hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-base">arrow_back</span>
                    Retour au site principal
                </a>
            </div>
        </div>
    </div>
</body>
</html>
