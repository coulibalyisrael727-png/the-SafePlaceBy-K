version: '3.9'

services:
  # Service PostgreSQL - Base de données
  db:
    image: postgres:16-alpine
    container_name: safeplace_db
    environment:
      POSTGRES_DB: ${DB_NAME:-safeplace_db}
      POSTGRES_USER: ${DB_USER:-safeplace_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-safeplace_password_123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-safeplace_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safeplace_network

  # Service Redis - Cache et sessions
  redis:
    image: redis:7-alpine
    container_name: safeplace_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safeplace_network

  # Service Django Web - Application principale
  web:
    build: .
    container_name: safeplace_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 Safeplace.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      
      # Base de données
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-safeplace_db}
      DB_USER: ${DB_USER:-safeplace_user}
      DB_PASSWORD: ${DB_PASSWORD:-safeplace_password_123}
      DB_HOST: db
      DB_PORT: 5432
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_123}
      
      # Stripe
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_your_key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_your_key}
      
      # Email
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
    
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    
    ports:
      - "8000:8000"
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - safeplace_network

  # Service Celery Worker - Tâches asynchrones
  celery:
    build: .
    container_name: safeplace_celery
    command: celery -A Safeplace worker -l info
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-safeplace_db}
      DB_USER: ${DB_USER:-safeplace_user}
      DB_PASSWORD: ${DB_PASSWORD:-safeplace_password_123}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_123}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_your_key}
    
    volumes:
      - .:/app
    
    depends_on:
      - db
      - redis
      - web
    
    networks:
      - safeplace_network

  # Service Celery Beat - Scheduler pour tâches planifiées
  celery_beat:
    build: .
    container_name: safeplace_celery_beat
    command: celery -A Safeplace beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-safeplace_db}
      DB_USER: ${DB_USER:-safeplace_user}
      DB_PASSWORD: ${DB_PASSWORD:-safeplace_password_123}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_123}
    
    volumes:
      - .:/app
    
    depends_on:
      - db
      - redis
      - web
    
    networks:
      - safeplace_network

  # Service Dashboard - Interface d'administration
  dashboard:
    build:
      context: ./dashboard-service
    container_name: safeplace_dashboard
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8001"
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-dashboard-secret-key}
      ALLOWED_HOSTS: "*"
      MAIN_API_URL: http://web:8000/api/v1/
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-safeplace_secret_dashboard_key_2026}
    ports:
      - "8001:8001"
    depends_on:
      - web
    networks:
      - safeplace_network

  # Service Nginx - Reverse proxy et serveur statique
  nginx:
    image: nginx:alpine
    container_name: safeplace_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - dashboard
    networks:
      - safeplace_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  safeplace_network:
    driver: bridge
