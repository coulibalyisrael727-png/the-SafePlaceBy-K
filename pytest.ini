[pytest]
DJANGO_SETTINGS_MODULE = Safeplace.settings
python_files = tests.py test_*.py *_tests.py
testpaths = podcastSafe/tests
addopts = 
    --verbose
    --cov=podcastSafe
    --cov-report=html
    --cov-report=term-missing
    --cov-config=.coveragerc
norecursedirs = .git .venv node_modules build dist

[coverage:run]
source = podcastSafe
omit = 
    */migrations/*
    */tests/*
    */__init__.py
    */wsgi.py
    */asgi.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
